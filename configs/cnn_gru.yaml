seed: 42
device: auto

data:
  root: data/raw
  download: true
  commands:
    - forward
    - backward
    - left
    - right
    - stop
  unknown_label: unknown
  sample_rate: 16000
  duration_seconds: 1.0
  unknown_ratio: 1.0
  batch_size: 64
  num_workers: 2

features:
  n_fft: 400
  win_length: 400
  hop_length: 160
  n_mels: 64

preprocessing:
  noise_reduction:
    enabled: false
    n_fft: 400
    win_length: 400
    hop_length: 160
    noise_quantile: 0.2
    reduction_strength: 0.8
    residual_floor: 0.05
  # Keep disabled for the existing checkpoint, which was trained without
  # speech alignment. Enable before the next full retraining run.
  speech_alignment:
    enabled: false
    frame_length_ms: 25.0
    hop_length_ms: 10.0
    padding_ms: 120.0
    max_gap_ms: 150.0
    noise_multiplier: 3.0
    minimum_peak_ratio: 0.08

# Training-only waveform augmentation. Keep disabled for the existing
# checkpoint; enable before retraining for robustness experiments.
augmentation:
  enabled: false
  normalize_after: true
  gain:
    enabled: true
    probability: 0.5
    min_db: -6.0
    max_db: 6.0
  time_shift:
    enabled: true
    probability: 0.5
    max_ms: 100.0
  add_noise:
    enabled: true
    probability: 0.5
    min_snr_db: 5.0
    max_snr_db: 20.0

model:
  type: cnn_gru
  conv_channels: [16, 32, 64]
  gru_hidden_size: 128
  gru_layers: 2
  bidirectional: false
  dropout: 0.3

training:
  epochs: 40
  learning_rate: 0.001
  weight_decay: 0.0001
  gradient_clip_norm: 5.0
  checkpoint_path: outputs/checkpoints/best_cnn_gru.pt

# Use plain argmax until a threshold is selected on the validation split.
inference:
  threshold: 0.0
  align_speech: true

outputs:
  figures_dir: outputs/figures
  metrics_dir: outputs/metrics
